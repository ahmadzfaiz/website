services:
  db:
    image: postgres:16-alpine
    container_name: faiz-website-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DBNAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: faiz-website-web
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      PG_HOST: db
      PG_PORT: 5432
    expose:
      - "8000"
    volumes:
      - ./media:/app/media
      - ./project/geoip:/app/project/geoip

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: faiz-website-tunnel
    restart: unless-stopped
    depends_on:
      - web
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}

volumes:
  pgdata:
